
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#07071a;color:#e8e8f0;font-size:13px}
input[type=number],input[type=text]{background:#13131f;border:1px solid #1e1e35;border-radius:8px;color:#e8e8f0;font-size:13px;font-family:'Courier New',monospace;padding:0 10px;height:36px;width:100%;outline:none}
select{background:#13131f;border:1px solid #1e1e35;border-radius:8px;color:#e8e8f0;font-size:12px;padding:0 10px;height:36px;width:100%;outline:none;cursor:pointer}
button{cursor:pointer;border:none;border-radius:8px;font-size:12px;font-weight:600;padding:0 14px;height:32px;transition:opacity .2s}
button:hover{opacity:.8}
.tab-bar{display:flex;gap:3px;padding:8px 16px;background:#0d0d1a;border-bottom:1px solid #1e1e35;overflow-x:auto}
.tab-bar::-webkit-scrollbar{height:3px}.tab-bar::-webkit-scrollbar-thumb{background:#1e1e35;border-radius:99px}
.tab-btn{padding:6px 12px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;color:#5b5b8a;background:transparent;border:none;cursor:pointer;transition:all .2s}
.tab-btn.active{background:#185FA5;color:#fff}
.panel{background:#0d0d1a;border:1px solid #1e1e35;border-radius:14px;padding:16px 18px;margin-bottom:12px}
.panel-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#5b5b8a;margin-bottom:13px}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #131328}
.row-label{font-size:12px;color:#888}
.row-val{font-size:13px;font-weight:600;font-family:'Courier New',monospace}
.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat{background:#13131f;border-radius:10px;padding:12px 14px}
.stat-label{font-size:10px;color:#5b5b8a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.stat-val{font-size:18px;font-weight:700;font-family:'Courier New',monospace}
.stat-sub{font-size:10px;color:#666;margin-top:3px}
.inp-wrap{margin-bottom:12px}
.inp-label{font-size:11px;color:#888;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.inp-row{display:flex;align-items:center;background:#13131f;border:1px solid #1e1e35;border-radius:8px;overflow:hidden;height:36px}
.inp-pre,.inp-suf{padding:0 9px;font-size:11px;color:#5b5b8a;height:100%;display:flex;align-items:center;white-space:nowrap}
.inp-pre{border-right:1px solid #1e1e35}.inp-suf{border-left:1px solid #1e1e35}
.inp-row input{background:transparent;border:none;outline:none;color:#e8e8f0;font-size:13px;font-family:'Courier New',monospace;padding:0 9px;height:100%;flex:1;width:0}
.bar-wrap{margin-top:8px}
.bar-row{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-bottom:3px}
.bar-track{height:5px;background:#13131f;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.alert{margin-top:9px;padding:8px 11px;border-radius:9px;font-size:11px;line-height:1.5}
.tip{margin-top:9px;padding:9px 11px;background:#185FA511;border:1px solid #185FA533;border-radius:9px;font-size:11px;color:#7ab3e0;line-height:1.6}
.edu{background:#0d0d1a;border:1px solid #1e1e35;border-radius:14px;padding:14px 16px;margin-bottom:12px}
.edu-title{font-size:11px;font-weight:700;color:#EF9F27;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.edu-formula{background:#13131f;border-radius:8px;padding:10px 13px;font-family:'Courier New',monospace;font-size:12px;color:#e8e8f0;margin-bottom:8px;text-align:center;letter-spacing:.03em}
.edu-body{font-size:11px;color:#888;line-height:1.7}
.edu-body b{color:#e8e8f0;font-weight:600}
.toggle-btn{display:flex;background:#13131f;border:1px solid #1e1e35;border-radius:6px;overflow:hidden;height:26px}
.toggle-opt{padding:0 10px;font-size:11px;font-weight:600;color:#5b5b8a;cursor:pointer;display:flex;align-items:center;border:none;background:transparent;transition:all .15s}
.toggle-opt.on{background:#185FA5;color:#fff;border-radius:5px}
.content{padding:16px}
</style>

<div id="app">
<div style="background:#0d0d1a;border-bottom:1px solid #1e1e35;padding:12px 16px;display:flex;align-items:center;justify-content:space-between">
  <div style="display:flex;align-items:center;gap:9px">
    <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#185FA5,#1D9E75);display:flex;align-items:center;justify-content:center;font-size:13px">◈</div>
    <div>
      <div style="font-size:13px;font-weight:700">Precifica</div>
      <div style="font-size:9px;color:#5b5b8a;letter-spacing:.06em">MVP v2.1 — 8 módulos</div>
    </div>
  </div>
  <div style="font-size:10px;background:#13131f;border:1px solid #185FA533;color:#185FA5;padding:3px 10px;border-radius:99px;font-weight:600">Fase 1 completa</div>
</div>
<div class="tab-bar" id="tabbar"></div>
<div class="content" id="content"></div>
</div>

<script>
const Rf=(v,d=2)=>Number(v).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});
const M=v=>Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const P=v=>`${Rf(v)}%`;
const REGIMES=[{label:'Simples Nacional',t:0.063},{label:'Lucro Presumido',t:0.1565},{label:'Lucro Real',t:0.2125}];

// ── ESTADO PERSISTENTE ──
const STATE = {
  margem: { pv:100, pc:60, ri:1 },
  desconto: { dpv:1000, dpc:600, ddesc:10, dqtd:10, dri:1, dMode:1 },
  mc: { mpv:42.25, mcmv:28.25, mfr:5.2, mout:6.4, mqtd:2959, mfix:35000 },
  roi: { rpv:5, rmcu:1, rvol:2400, rdesc:10, raum:50, rcusto:0, rMode:1 },
  payback: { pinv:5000, pvend:3000, pmarg:25, paum:35 },
  potencial: { pvat:125000, ppen:28, pprod:126 },
  negociacao: { nfpv:4.50, ncmv:2.89, nvpv:7.99, npromo:5.99, nperc:50 },
  projecao: { ri:1, produtos:[
    {nome:'Produto A',preco:500,custo:280,qtd:50},
    {nome:'Produto B',preco:1200,custo:600,qtd:20},
    {nome:'Produto C',preco:250,custo:180,qtd:100},
  ]}
};

function g(id){return document.getElementById(id);}
function v(id){return parseFloat(g(id)?.value)||0;}

function saveField(tab, id) {
  const el = g(id);
  if (!el) return;
  const val = el.type === 'number' ? (parseFloat(el.value)||0) : el.value;
  STATE[tab][id] = val;
}

function bindSave(tab, ids) {
  ids.forEach(id => {
    const el = g(id);
    if (!el) return;
    el.addEventListener('input', () => saveField(tab, id));
    el.addEventListener('change', () => saveField(tab, id));
  });
}

function restoreFields(tab, ids) {
  ids.forEach(id => {
    const el = g(id);
    if (!el) return;
    if (STATE[tab][id] !== undefined) el.value = STATE[tab][id];
  });
}

function inp(id,label,val,pre,suf,hint){
  return `<div class="inp-wrap">
    <div class="inp-label"><span>${label}</span>${hint?`<span style="color:#5b5b8a;font-size:10px">${hint}</span>`:''}</div>
    <div class="inp-row">
      ${pre?`<div class="inp-pre">${pre}</div>`:''}
      <input type="number" id="${id}" value="${val}">
      ${suf?`<div class="inp-suf">${suf}</div>`:''}
    </div>
  </div>`;
}
function sel(id,label,idx){
  return `<div class="inp-wrap">
    <div class="inp-label"><span>${label}</span></div>
    <select id="${id}">${REGIMES.map((r,i)=>`<option value="${i}"${i==idx?' selected':''}>${r.label} (${Rf(r.t*100)}%)</option>`).join('')}</select>
  </div>`;
}
function panel(title,html,accent){
  return `<div class="panel" style="border-color:${accent||'#1e1e35'}">
    <div class="panel-title" style="color:${accent||'#5b5b8a'}">${title}</div>${html}</div>`;
}
function row(label,val,color,muted){
  return `<div class="row"><span class="row-label" style="color:${muted?'#5b5b8a':'#888'}">${label}</span><span class="row-val" style="color:${color||'#e8e8f0'}">${val}</span></div>`;
}
function bar(val,label,max){
  max=max||100;
  const w=Math.min(Math.max(val,0),max)/max*100;
  const c=val<0?'#E24B4A':val<10?'#EF9F27':val<25?'#1D9E75':'#185FA5';
  return `<div class="bar-wrap"><div class="bar-row"><span>${label}</span><span style="color:${c};font-weight:700">${Rf(val)}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${c}"></div></div></div>`;
}
function stat(label,val,color,sub){
  return `<div class="stat" style="border:1px solid ${color}33"><div class="stat-label">${label}</div><div class="stat-val" style="color:${color}">${val}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;
}
function alrt(msg,type){
  const c=type==='ok'?'#1D9E75':type==='warn'?'#EF9F27':'#E24B4A';
  return `<div class="alert" style="background:${c}11;border:1px solid ${c}44;color:${c}">${msg}</div>`;
}
function tip(msg){return `<div class="tip">&#128161; ${msg}</div>`;}
function toggleHtml(opts,active,fn){
  return `<div class="toggle-btn">${opts.map((o,i)=>`<button class="toggle-opt${i===active?' on':''}" onclick="(${fn})(${i})">${o}</button>`).join('')}</div>`;
}
function edu(title,formula,body){
  return `<div class="edu">
    <div class="edu-title"><span style="font-size:14px">&#128218;</span> ${title}</div>
    <div class="edu-formula">${formula}</div>
    <div class="edu-body">${body}</div>
  </div>`;
}

const EDUS={
  margem: edu('Como funciona — Margem & Markup',
    'Margem = (PV − PC) ÷ PV &nbsp;|&nbsp; Markup = (PV − PC) ÷ PC',
    `<b>PV</b> = Preço de Venda (o que o cliente paga). <b>PC</b> = Preço de Custo (o que você pagou).<br>
    A diferença é chamada de <b>lucro bruto</b>. O sistema desconta automaticamente os impostos do regime escolhido para chegar na <b>margem real</b>.<br><br>
    <b>Exemplo:</b> Comprou por R$60, vende por R$100. Com Lucro Presumido (15,65% de impostos), sobram R$24,35 → Margem real = 24,35%.`),

  desconto: edu('Como funciona — Simulador de Desconto',
    'Preço final = PV × (1 − desconto) &nbsp;|&nbsp; Teto = Margem máx. antes dos impostos',
    `Informe o <b>preço de tabela</b>, o <b>custo</b> e o <b>desconto</b> que pretende dar. O sistema calcula em tempo real quanto sobra de margem depois do desconto e dos impostos.<br><br>
    O <b>teto seguro</b> é o desconto máximo antes de vender no prejuízo. Use o toggle <b>R$ / %</b> para informar o desconto como valor financeiro ou como percentual.<br><br>
    <b>Exemplo:</b> Produto a R$1.000, custo R$600, desconto de 10% → preço final R$900. Verifique se ainda sobra margem após os impostos.`),

  mc: edu('Como funciona — Margem de Contribuição',
    'MC = PV − CMV − Frete% − Outras% &nbsp;|&nbsp; Lucro = MC total − Custos Fixos',
    `A <b>MC</b> é o que sobra de cada venda depois de pagar os custos variáveis (CMV, frete, comissão).<br><br>
    <b>Frete e Outras variáveis</b> são informados como <b>% do preço de venda</b>. Exemplo: frete de 5% sobre R$100 = R$5 por unidade.<br><br>
    Os <b>custos fixos</b> (aluguel, equipe) não variam com o volume. Se a MC total for maior que os fixos, a operação dá lucro.<br><br>
    <b>Exemplo:</b> Venda R$42,25, CMV R$28,25, frete 5,2%, outras 6,4% → MC unitária = R$9,10.`),

  roi: edu('Como funciona — ROI Promocional',
    'ROI = (MC incremental − Custo da ação) ÷ Custo da ação',
    `Antes de aceitar uma proposta comercial, calcule se ela gera retorno real.<br><br>
    Informe o <b>preço atual</b>, a <b>MC unitária</b>, o <b>volume mensal</b>, o <b>desconto pedido</b> (R$ ou %) e o <b>aumento de volume esperado</b>.<br><br>
    O cálculo é feito sobre o <b>volume incremental</b> — as vendas a mais que a ação vai gerar, não sobre o total.<br><br>
    <b>Exemplo:</b> 10% de desconto + 50% mais volume com MC de R$1. Se a MC incremental não cobrir o desconto concedido, o ROI é negativo.`),

  payback: edu('Como funciona — Payback',
    'Payback (meses) = Custo do investimento ÷ MC incremental por mês',
    `Use para avaliar investimentos em PDV, gôndola iluminada, display, promotor, etc.<br><br>
    Informe o <b>custo do investimento</b>, sua <b>venda mensal atual</b>, a <b>margem de contribuição</b> e o <b>aumento de vendas esperado</b>.<br><br>
    O sistema calcula em quantos meses o investimento se paga e projeta o acumulado mês a mês.<br><br>
    <b>Exemplo:</b> Investimento de R$5.000, MC incremental de R$263/mês → Payback em 19 meses.`),

  potencial: edu('Como funciona — Potencial de Cliente',
    'Potencial total = Venda atual ÷ (Penetração% ÷ 100)',
    `Descubra quanto dinheiro você está deixando na mesa em cada cliente.<br><br>
    Informe a <b>venda mensal atual</b> com o cliente e o <b>% de penetração</b> (quantos dos seus produtos ele compra). O sistema calcula o potencial pelo raciocínio de regra de 3.<br><br>
    <b>Exemplo:</b> Cliente compra R$125.000/mês e trabalha com 28% do portfólio. Potencial real = R$446.000. Perda mensal = R$321.000.`),

  negociacao: edu('Como funciona — Negociação Promocional',
    'Rebaixa = PV normal − PV promo &nbsp;|&nbsp; Divisão entre fornecedor e varejo',
    `Quando o varejo pede rebaixa de preço para uma promoção, é preciso negociar quem paga.<br><br>
    Informe o <b>preço que você cobra do varejo</b>, seu <b>CMV</b>, o <b>preço de venda ao consumidor</b> e o <b>preço promocional</b> desejado.<br><br>
    Use o campo <b>% da rebaixa que você paga</b> para simular diferentes divisões e ver o impacto na margem de cada parte.<br><br>
    <b>Exemplo:</b> Rebaixa de R$2,00. Se você paga 50% e o varejo paga 50%, verifique se ambos mantêm margem positiva.`),

  projecao: edu('Como funciona — Projeção de Resultados',
    'Lucro = (PV − PC − Impostos) × Qtd &nbsp;|&nbsp; Margem consolidada = Lucro total ÷ Receita total',
    `Simule múltiplos produtos ao mesmo tempo para ver o resultado consolidado da operação.<br><br>
    Edite os campos diretamente na tabela: <b>preço</b>, <b>custo</b> e <b>quantidade</b>. Os impostos do regime selecionado são aplicados automaticamente.<br><br>
    <b>Exemplo:</b> Mix de 3 produtos com preços e volumes diferentes. O sistema consolida receita total, lucro total e margem média da operação.`)
};

const TABS=[
  {label:'Margem & Markup',render:renderMargem},
  {label:'Simulador Desconto',render:renderDesconto},
  {label:'Margem Contribuição',render:renderMC},
  {label:'ROI Promocional',render:renderROI},
  {label:'Payback',render:renderPayback},
  {label:'Potencial Cliente',render:renderPotencial},
  {label:'Negociação Promo',render:renderNegociacao},
  {label:'Projeção Resultados',render:renderProjecao},
];
let currentTab=0;
function renderTabs(){
  document.getElementById('tabbar').innerHTML=TABS.map((t,i)=>`<button class="tab-btn${i===currentTab?' active':''}" onclick="switchTab(${i})">${t.label}</button>`).join('');
}
function switchTab(i){currentTab=i;renderTabs();TABS[i].render();}

// ── 1. MARGEM ──
function renderMargem(){
  const s=STATE.margem;
  document.getElementById('content').innerHTML=`
    ${EDUS.margem}
    <div class="grid2">
      <div>${panel('Dados do produto',
        inp('pv','Preço de venda (PV)',s.pv,'R$')+
        inp('pc','Custo do produto (PC)',s.pc,'R$')+
        sel('ri','Regime tributário',s.ri)
      )}</div>
      <div id="res_margem"></div>
    </div>`;
  bindSave('margem',['pv','pc','ri']);
  ['pv','pc','ri'].forEach(id=>g(id)?.addEventListener('input',calcMargem));
  calcMargem();
}
function calcMargem(){
  saveField('margem','pv');saveField('margem','pc');saveField('margem','ri');
  const pv=v('pv'),pc=v('pc'),ri=parseInt(g('ri')?.value||STATE.margem.ri);
  const reg=REGIMES[ri],imp=pv*reg.t,lucro=pv-pc-imp;
  const margem=pv>0?(lucro/pv)*100:0,markup=pc>0?((pv-pc)/pc)*100:0,precoMin=pc>0?pc/(1-reg.t):0;
  const ac=lucro>=0?'#1D9E75':'#E24B4A';
  g('res_margem').innerHTML=
    panel('Resultado em tempo real',
      row('Preço de venda (PV)',M(pv),'#e8e8f0',true)+
      row(`Impostos ${reg.label} (${Rf(reg.t*100)}%)`,`− ${M(imp)}`,'#E24B4A',true)+
      row('Custo do produto (PC)',`− ${M(pc)}`,'#E24B4A',true)+
      row('Lucro líquido real',M(lucro),lucro>=0?'#1D9E75':'#E24B4A')+
      bar(margem,'Margem real (lucro ÷ PV)')+bar(markup,'Markup (lucro ÷ PC)',200),ac)+
    `<div class="grid2" style="margin-top:10px">
      ${stat('Preço mínimo viável',M(precoMin),'#EF9F27','Abaixo disso = prejuízo')}
      ${stat('Markup',P(markup),'#7F77DD','% sobre o custo')}
    </div>`+
    (lucro<0?alrt(`Venda no prejuízo — perdendo ${M(Math.abs(lucro))} por unidade`,'danger'):'')+
    (lucro>=0&&margem<10?alrt('Margem abaixo de 10% — risco se custos subirem','warn'):'');
}

// ── 2. DESCONTO ──
function renderDesconto(){
  document.getElementById('content').innerHTML=`
    ${EDUS.desconto}
    <div class="grid2">
      <div id="desc_form"></div>
      <div id="res_desc"></div>
    </div>`;
  buildDescontoForm();
}
function buildDescontoForm(){
  const s=STATE.desconto;
  const dMode=s.dMode;
  const togHtml=`<div class="inp-wrap">
    <div class="inp-label"><span>Desconto</span>${toggleHtml(['R$','%'],dMode,'setDMode')}</div>
    <div class="inp-row">
      <div class="inp-pre">${dMode===0?'R$':'%'}</div>
      <input type="number" id="ddesc" value="${s.ddesc}">
    </div>
  </div>`;
  g('desc_form').innerHTML=panel('Parâmetros',
    inp('dpv','Preço de tabela',s.dpv,'R$')+
    inp('dpc','Custo do produto',s.dpc,'R$')+
    togHtml+
    inp('dqtd','Quantidade',s.dqtd,'','un')+
    sel('dri','Regime tributário',s.dri));
  ['dpv','dpc','ddesc','dqtd','dri'].forEach(id=>g(id)?.addEventListener('input',()=>{saveField('desconto',id);calcDesconto();}));
  calcDesconto();
}
function setDMode(m){STATE.desconto.dMode=m;buildDescontoForm();}
function calcDesconto(){
  const s=STATE.desconto;
  const pv=v('dpv'),pc=v('dpc'),qtd=v('dqtd'),ri=parseInt(g('dri')?.value||s.dri);
  const dMode=s.dMode,descRaw=v('ddesc');
  const descVal=dMode===0?descRaw:(pv*descRaw/100);
  const descPct=pv>0?(descVal/pv)*100:0;
  const reg=REGIMES[ri],pvF=pv-descVal,imp=pvF*reg.t,lucroU=pvF-pc-imp;
  const margem=pvF>0?(lucroU/pvF)*100:0;
  const margemSem=pv>0?((pv-pc-pv*reg.t)/pv)*100:0;
  const limite=((1-reg.t)-pc/pv)*100;
  g('res_desc').innerHTML=
    panel('Impacto do desconto',
      row('Preço de tabela',M(pv),'#e8e8f0',true)+
      row(`Desconto (${Rf(descPct)}%)`,`− ${M(descVal)}`,'#E24B4A')+
      row('Preço final ao cliente',M(Math.max(pvF,0)),'#e8e8f0')+
      row('Lucro por unidade',M(lucroU),lucroU>=0?'#1D9E75':'#E24B4A')+
      bar(margemSem,'Margem sem desconto')+bar(margem,'Margem com desconto')+
      (margemSem-margem>0?`<div style="margin-top:8px;padding:7px 11px;background:#13131f;border-radius:8px;font-size:11px;color:#888">O desconto consumiu <span style="color:#EF9F27;font-weight:700">${Rf(margemSem-margem)} p.p.</span> da margem</div>`:'')
    ,'#EF9F27')+
    `<div class="grid2" style="margin-top:10px">
      ${stat('Lucro total lote',M(lucroU*qtd),lucroU>=0?'#1D9E75':'#E24B4A')}
      ${stat('Teto seguro',P(limite),'#185FA5','Máximo sem prejuízo')}
    </div>`+
    (descPct>limite?alrt(`Desconto acima do teto (${Rf(limite)}%) — venda gerando prejuízo`,'danger'):'')+
    tip('Use o toggle R$ / % para informar o desconto do jeito que preferir.');
}

// ── 3. MC ──
function renderMC(){
  const s=STATE.mc;
  document.getElementById('content').innerHTML=`
    ${EDUS.mc}
    <div class="grid2">
      <div>${panel('Variáveis',
        inp('mpv','Preço de venda',s.mpv,'R$')+
        inp('mcmv','CMV — Custo da mercadoria',s.mcmv,'R$','','Valor pago pelo produto')+
        inp('mfr','Frete / logística',s.mfr,'','% do PV','Ex: 5% = R$2,11 sobre R$42,25')+
        inp('mout','Outras variáveis (comissão, etc.)',s.mout,'','% do PV','Ex: comissão do vendedor')+
        inp('mqtd','Quantidade vendida no período',s.mqtd,'','un')+
        inp('mfix','Custos fixos totais (mês)',s.mfix,'R$','','Aluguel, equipe, etc.')
      )}</div>
      <div id="res_mc"></div>
    </div>`;
  ['mpv','mcmv','mfr','mout','mqtd','mfix'].forEach(id=>g(id)?.addEventListener('input',()=>{saveField('mc',id);calcMC();}));
  calcMC();
}
function calcMC(){
  const pv=v('mpv'),cmv=v('mcmv'),frPct=v('mfr'),outPct=v('mout'),qtd=v('mqtd'),fix=v('mfix');
  const frVal=pv*frPct/100,outVal=pv*outPct/100;
  const mcU=pv-cmv-frVal-outVal,mcTT=mcU*qtd,lucro=mcTT-fix;
  const margemMC=pv>0?(mcU/pv)*100:0;
  const be=mcU>0?fix/mcU:Infinity;
  g('res_mc').innerHTML=
    panel('Margem de contribuição',
      row('Preço de venda',M(pv))+
      row('− CMV',M(cmv),'#E24B4A',true)+
      row(`− Frete (${Rf(frPct)}% = ${M(frVal)})`,M(frVal),'#E24B4A',true)+
      row(`− Outras variáveis (${Rf(outPct)}% = ${M(outVal)})`,M(outVal),'#E24B4A',true)+
      row('MC unitária (sobra por venda)',M(mcU),mcU>=0?'#1D9E75':'#E24B4A')+
      row(`MC total (${Rf(qtd,0)} unidades)`,M(mcTT),mcU>=0?'#1D9E75':'#E24B4A')+
      row('− Custos fixos',`− ${M(fix)}`,'#E24B4A',true)+
      row('Lucro final',M(lucro),lucro>=0?'#1D9E75':'#E24B4A')+
      bar(margemMC,'Margem de contribuição %')
    ,'#7F77DD')+
    `<div class="grid2" style="margin-top:10px">
      ${stat('MC unitária',M(mcU),mcU>=0?'#1D9E75':'#E24B4A','Sobra por unidade')}
      ${stat('Breakeven',mcU>0?`${Rf(be,0)} un`:'∞','#EF9F27',mcU>0?'Mínimo para cobrir fixos':'MC negativa')}
    </div>`+
    (mcU<0?alrt('MC negativa — quanto mais você vende, mais perde. Revise os custos.','danger'):'')+
    (mcU>0&&lucro<0?alrt(`Volume insuficiente para cobrir os fixos. Precisa de ${Rf(be,0)} un.`,'warn'):'')+
    tip(`Frete de ${Rf(frPct)}% = ${M(frVal)} por unidade. Outras variáveis de ${Rf(outPct)}% = ${M(outVal)} por unidade.`);
}

// ── 4. ROI ──
function renderROI(){
  document.getElementById('content').innerHTML=`
    ${EDUS.roi}
    <div class="grid2">
      <div id="roi_form"></div>
      <div id="res_roi"></div>
    </div>`;
  buildROIForm();
}
function buildROIForm(){
  const s=STATE.roi;
  const rMode=s.rMode;
  const togHtml=`<div class="inp-wrap">
    <div class="inp-label"><span>Desconto da promoção</span>${toggleHtml(['R$','%'],rMode,'setRMode')}</div>
    <div class="inp-row">
      <div class="inp-pre">${rMode===0?'R$':'%'}</div>
      <input type="number" id="rdesc" value="${s.rdesc}">
    </div>
  </div>`;
  g('roi_form').innerHTML=panel('Parâmetros da ação',
    inp('rpv','Preço atual de venda',s.rpv,'R$')+
    inp('rmcu','MC unitária atual',s.rmcu,'R$','','Preço − todos os custos variáveis')+
    inp('rvol','Volume mensal atual',s.rvol,'','un')+
    togHtml+
    inp('raum','Aumento de volume esperado',s.raum,'','%','Quanto a promoção deve gerar a mais')+
    inp('rcusto','Custo adicional da ação',s.rcusto,'R$','','Display, brinde...')
  );
  ['rpv','rmcu','rvol','rdesc','raum','rcusto'].forEach(id=>g(id)?.addEventListener('input',()=>{saveField('roi',id);calcROI();}));
  calcROI();
}
function setRMode(m){STATE.roi.rMode=m;buildROIForm();}
function calcROI(){
  const s=STATE.roi;
  const pv=v('rpv'),mcU=v('rmcu'),vol=v('rvol'),aum=v('raum'),custo=v('rcusto');
  const rMode=s.rMode,descRaw=v('rdesc');
  const descVal=rMode===0?descRaw:(pv*descRaw/100);
  const mcUP=mcU-descVal;
  const volP=vol*(1+aum/100),volI=volP-vol;
  const mcAt=mcU*vol,mcPr=mcUP*volP,diff=mcPr-mcAt;
  const resultado=diff-custo;
  const roi=custo>0?((diff-custo)/custo)*100:null;
  g('res_roi').innerHTML=
    panel('Análise do ROI',
      row('Volume atual',`${Rf(vol,0)} un`,null,true)+
      row(`Volume com promo (+${Rf(aum)}%)`,`${Rf(volP,0)} un`)+
      row('Volume incremental gerado',`+${Rf(volI,0)} un`,'#185FA5')+
      row('MC total sem promo',M(mcAt),null,true)+
      row('MC total com promo',M(mcPr))+
      row('Variação de MC',M(diff),diff>=0?'#1D9E75':'#E24B4A')+
      (custo>0?row('− Custo da ação',`− ${M(custo)}`,'#E24B4A'):'')
    ,resultado>=0?'#1D9E75':'#E24B4A')+
    `<div class="grid2" style="margin-top:10px">
      ${stat('Resultado líquido',M(resultado),resultado>=0?'#1D9E75':'#E24B4A','MC incremental − custo')}
      ${stat('ROI da ação',roi!==null?P(roi):resultado>=0?'Positivo':'Negativo',resultado>=0?'#1D9E75':'#E24B4A')}
    </div>`+
    (resultado<0?alrt(`Ação destrói margem — você perde ${M(Math.abs(resultado))} no período`,'danger'):'')+
    (resultado===0?alrt('Resultado zero — ação empata, sem retorno financeiro','warn'):'')+
    (resultado>0?alrt(`Ação rentável — gera ${M(resultado)} de margem incremental`,'ok'):'')+
    tip('O cálculo é sempre sobre o volume INCREMENTAL — as vendas extras que a ação vai gerar.');
}

// ── 5. PAYBACK ──
function renderPayback(){
  const s=STATE.payback;
  document.getElementById('content').innerHTML=`
    ${EDUS.payback}
    <div class="grid2">
      <div>${panel('Investimento',
        inp('pinv','Custo do investimento',s.pinv,'R$','','Ex: gôndola, display, PDV')+
        inp('pvend','Venda mensal atual',s.pvend,'R$')+
        inp('pmarg','Margem de contribuição',s.pmarg,'','%')+
        inp('paum','Aumento de vendas esperado',s.paum,'','%')
      )}</div>
      <div id="res_pay"></div>
    </div>`;
  ['pinv','pvend','pmarg','paum'].forEach(id=>g(id)?.addEventListener('input',()=>{saveField('payback',id);calcPayback();}));
  calcPayback();
}
function calcPayback(){
  const inv=v('pinv'),vend=v('pvend'),marg=v('pmarg'),aum=v('paum');
  const mcBase=vend*(marg/100),vendP=vend*(1+aum/100),mcP=vendP*(marg/100),mcI=mcP-mcBase;
  const pb=mcI>0?inv/mcI:Infinity;
  const roi12=mcI>0?((mcI*12-inv)/inv)*100:-100;
  let meses='';
  for(let m=1;m<=12;m++){
    const ac=mcI*m-inv;
    const w=Math.min(Math.max((mcI*m/inv)*100,0),100);
    const c=ac>=0?'#1D9E75':'#EF9F27';
    meses+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
      <span style="font-size:10px;color:#5b5b8a;width:20px">M${m}</span>
      <div style="flex:1;height:4px;background:#1e1e35;border-radius:99px;overflow:hidden"><div style="height:100%;width:${w}%;background:${c};border-radius:99px"></div></div>
      <span style="font-size:10px;font-family:'Courier New',monospace;color:${ac>=0?'#1D9E75':'#888'};width:80px;text-align:right">${M(ac)}</span>
    </div>`;
  }
  g('res_pay').innerHTML=
    panel('Análise de payback',
      row('MC base por mês',M(mcBase),null,true)+
      row(`MC com investimento (+${aum}%)`,M(mcP))+
      row('MC incremental por mês',M(mcI),'#1D9E75')
    ,'#1D9E75')+
    `<div class="grid2" style="margin-top:10px;margin-bottom:10px">
      ${stat('Payback',mcI>0?`${Rf(pb,1)} meses`:'∞',pb<=12?'#1D9E75':'#EF9F27',pb<=12?'Retorno dentro do ano':'Retorno acima de 12 meses')}
      ${stat('ROI em 12 meses',P(roi12),roi12>=0?'#1D9E75':'#E24B4A','Retorno sobre o investimento')}
    </div>
    <div style="background:#13131f;border-radius:10px;padding:12px 14px">
      <div style="font-size:10px;color:#5b5b8a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em">Acumulado mês a mês</div>
      ${meses}
    </div>`;
}

// ── 6. POTENCIAL ──
function renderPotencial(){
  const s=STATE.potencial;
  document.getElementById('content').innerHTML=`
    ${EDUS.potencial}
    <div class="grid2">
      <div>${panel('Dados do cliente',
        inp('pvat','Venda mensal atual com este cliente',s.pvat,'R$')+
        inp('ppen','% do portfólio que ele compra',s.ppen,'','%','Ex: 28 = compra 28% dos seus SKUs')+
        inp('pprod','Total de SKUs no seu portfólio',s.pprod,'','SKUs')
      )}</div>
      <div id="res_pot"></div>
    </div>`;
  ['pvat','ppen','pprod'].forEach(id=>g(id)?.addEventListener('input',()=>{saveField('potencial',id);calcPotencial();}));
  calcPotencial();
}
function calcPotencial(){
  const vat=v('pvat'),pen=v('ppen'),prod=v('pprod');
  const potTotal=pen>0?vat/(pen/100):0,perdendo=potTotal-vat;
  const ativos=Math.round(prod*pen/100),inativos=prod-ativos;
  g('res_pot').innerHTML=
    panel('Potencial oculto',
      row('Venda atual',M(vat),null,true)+
      row(`SKUs ativos (${Rf(pen)}% de ${prod})`,`${ativos} produtos`)+
      row('Potencial total estimado',M(potTotal),'#185FA5')+
      row('Você está deixando de ganhar',M(perdendo),'#E24B4A')+
      row('SKUs inativos neste cliente',`${inativos} produtos`,'#EF9F27')
    ,'#EF9F27')+
    `<div class="grid3" style="margin-top:10px">
      ${stat('Perda mensal',M(perdendo),'#E24B4A','Potencial não aproveitado')}
      ${stat('Perda anual',M(perdendo*12),'#E24B4A','')}
      ${stat('SKUs inativos',`${inativos}`,'#EF9F27','Produtos sem venda')}
    </div>`+
    (pen<30?alrt(`Penetração crítica — ${inativos} dos seus produtos nunca foram vendidos para este cliente`,'danger'):'')+
    tip(`Ativar mais ${Math.min(10,inativos)} produtos pode gerar +${M(perdendo/Math.max(inativos,1)*Math.min(10,inativos))}/mês.`);
}

// ── 7. NEGOCIAÇÃO ──
function renderNegociacao(){
  const s=STATE.negociacao;
  document.getElementById('content').innerHTML=`
    ${EDUS.negociacao}
    <div class="grid2">
      <div>${panel('Cenário',
        inp('nfpv','Seu preço para o varejo',s.nfpv,'R$')+
        inp('ncmv','Seu CMV (custo de produção)',s.ncmv,'R$')+
        inp('nvpv','Preço do varejo ao consumidor',s.nvpv,'R$')+
        inp('npromo','Preço promocional desejado',s.npromo,'R$')+
        inp('nperc','% da rebaixa que você paga',s.nperc,'','%','0% = varejo paga tudo · 100% = você paga tudo')
      )}</div>
      <div id="res_neg"></div>
    </div>`;
  ['nfpv','ncmv','nvpv','npromo','nperc'].forEach(id=>g(id)?.addEventListener('input',()=>{saveField('negociacao',id);calcNeg();}));
  calcNeg();
}
function calcNeg(){
  const fpv=v('nfpv'),cmv=v('ncmv'),vpv=v('nvpv'),promo=v('npromo'),perc=v('nperc');
  const lf=fpv-cmv,mf=fpv>0?(lf/fpv)*100:0;
  const lv=vpv-fpv,mv=vpv>0?(lv/vpv)*100:0;
  const reb=vpv-promo,pF=reb*(perc/100),pV=reb-pF;
  const nlF=lf-pF,nmF=fpv>0?(nlF/fpv)*100:0;
  const nlV=promo-fpv+pF,nmV=promo>0?(nlV/promo)*100:0;
  g('res_neg').innerHTML=
    panel('Antes × Depois da promoção',
      `<div style="font-size:10px;color:#5b5b8a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Situação atual</div>
      <div class="grid2" style="margin-bottom:12px">
        <div style="background:#13131f;border-radius:9px;padding:10px 12px">
          <div style="font-size:10px;color:#5b5b8a;margin-bottom:5px">Você (fornecedor)</div>
          <div style="font-size:12px;color:#888">Lucro: <span style="color:#1D9E75;font-weight:700">${M(lf)}</span></div>
          <div style="font-size:12px;color:#888">Margem: <span style="color:#1D9E75;font-weight:700">${P(mf)}</span></div>
        </div>
        <div style="background:#13131f;border-radius:9px;padding:10px 12px">
          <div style="font-size:10px;color:#5b5b8a;margin-bottom:5px">Varejo</div>
          <div style="font-size:12px;color:#888">Lucro: <span style="color:#185FA5;font-weight:700">${M(lv)}</span></div>
          <div style="font-size:12px;color:#888">Margem: <span style="color:#185FA5;font-weight:700">${P(mv)}</span></div>
        </div>
      </div>`+
      row('Rebaixa total necessária',M(reb),'#EF9F27')+
      row(`Você paga (${Rf(perc)}%)`,M(pF),'#E24B4A')+
      row(`Varejo paga (${Rf(100-perc)}%)`,M(pV),'#E24B4A')+
      `<div style="font-size:10px;color:#5b5b8a;text-transform:uppercase;letter-spacing:.08em;margin:12px 0 8px">Com a promoção</div>
      <div class="grid2">
        <div style="background:#13131f;border-radius:9px;padding:10px 12px">
          <div style="font-size:10px;color:#5b5b8a;margin-bottom:5px">Você (fornecedor)</div>
          <div style="font-size:12px;color:#888">Lucro: <span style="color:${nlF>=0?'#1D9E75':'#E24B4A'};font-weight:700">${M(nlF)}</span></div>
          <div style="font-size:12px;color:#888">Margem: <span style="color:${nlF>=0?'#1D9E75':'#E24B4A'};font-weight:700">${P(nmF)}</span></div>
        </div>
        <div style="background:#13131f;border-radius:9px;padding:10px 12px">
          <div style="font-size:10px;color:#5b5b8a;margin-bottom:5px">Varejo</div>
          <div style="font-size:12px;color:#888">Lucro: <span style="color:${nlV>=0?'#185FA5':'#E24B4A'};font-weight:700">${M(nlV)}</span></div>
          <div style="font-size:12px;color:#888">Margem: <span style="color:${nlV>=0?'#185FA5':'#E24B4A'};font-weight:700">${P(nmV)}</span></div>
        </div>
      </div>`+
      (nlF<0?alrt('Você fica no prejuízo com essa divisão. Reduza o % que você paga.','danger'):'')+
      (nlV<0?alrt('Varejo fica no prejuízo. A promoção provavelmente não será aceita.','warn'):'')
    ,'#7F77DD')+
    tip('Ajuste o % para encontrar uma divisão em que ambos os lados mantenham margem positiva.');
}

// ── 8. PROJEÇÃO ──
function renderProjecao(){
  const s=STATE.projecao;
  document.getElementById('content').innerHTML=`
    ${EDUS.projecao}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <select id="prori" style="width:auto">${REGIMES.map((r,i)=>`<option value="${i}"${i==s.ri?' selected':''}>${r.label}</option>`).join('')}</select>
      <button onclick="addProd()" style="background:#185FA5;color:#fff">+ Produto</button>
    </div>
    <div id="prod_table"></div>
    <div id="pro_stats" class="grid3" style="margin-top:12px"></div>`;
  g('prori').addEventListener('change',e=>{STATE.projecao.ri=parseInt(e.target.value);renderProdTable();});
  renderProdTable();
}
function renderProdTable(){
  const s=STATE.projecao;
  const reg=REGIMES[s.ri];
  let rows='';let totR=0,totL=0;
  s.produtos.forEach((p,i)=>{
    const imp=p.preco*reg.t,lu=p.preco-p.custo-imp,rec=p.preco*p.qtd,luc=lu*p.qtd,mg=p.preco>0?(lu/p.preco)*100:0;
    totR+=rec;totL+=luc;
    const mc=mg<0?'#E24B4A':mg<10?'#EF9F27':'#1D9E75';
    rows+=`<tr style="border-top:1px solid #131328">
      <td style="padding:6px 9px"><input type="text" value="${p.nome}" onchange="updProd(${i},'nome',this.value)" style="width:85px;height:28px;font-size:12px"></td>
      <td style="padding:6px 9px"><input type="number" value="${p.preco}" onchange="updProd(${i},'preco',this.value)" style="width:72px;height:28px;font-size:12px"></td>
      <td style="padding:6px 9px"><input type="number" value="${p.custo}" onchange="updProd(${i},'custo',this.value)" style="width:72px;height:28px;font-size:12px"></td>
      <td style="padding:6px 9px"><input type="number" value="${p.qtd}" onchange="updProd(${i},'qtd',this.value)" style="width:58px;height:28px;font-size:12px"></td>
      <td style="padding:6px 9px;font-family:'Courier New',monospace;font-size:12px;color:#888">${M(rec)}</td>
      <td style="padding:6px 9px;font-family:'Courier New',monospace;font-size:12px;color:${luc>=0?'#1D9E75':'#E24B4A'};font-weight:600">${M(luc)}</td>
      <td style="padding:6px 9px"><span style="font-size:11px;font-weight:700;color:${mc}">${Rf(mg)}%</span></td>
      <td style="padding:6px 9px"><button onclick="remProd(${i})" style="background:none;color:#5b5b8a;font-size:14px;padding:0 6px;height:auto">×</button></td>
    </tr>`;
  });
  const mg=totR>0?(totL/totR)*100:0;
  g('prod_table').innerHTML=`<div style="background:#0d0d1a;border:1px solid #1e1e35;border-radius:12px;overflow:auto">
    <table style="width:100%;border-collapse:collapse;min-width:500px">
      <thead><tr style="background:#13131f">${['Produto','Preço R$','Custo R$','Qtd','Receita','Lucro','Margem',''].map(h=>`<th style="padding:8px 9px;font-size:10px;font-weight:700;color:#5b5b8a;text-align:left;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap">${h}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
  g('pro_stats').innerHTML=
    stat('Receita total',M(totR),'#185FA5')+
    stat('Lucro total',M(totL),totL>=0?'#1D9E75':'#E24B4A')+
    stat('Margem consolidada',P(mg),mg<10?'#EF9F27':'#1D9E75');
}
function addProd(){STATE.projecao.produtos.push({nome:`Produto ${String.fromCharCode(65+STATE.projecao.produtos.length)}`,preco:300,custo:150,qtd:30});renderProdTable();}
function remProd(i){STATE.projecao.produtos.splice(i,1);renderProdTable();}
function updProd(i,f,val){STATE.projecao.produtos[i][f]=f==='nome'?val:parseFloat(val)||0;renderProdTable();}

renderTabs();
TABS[0].render();
</script>
